<div class="card login-card border-0 shadow-lg rounded-4 overflow-hidden w-100">
  <div class="card-body p-4">
    <div class="text-center mb-4">
      <div class="brand-icon mx-auto mb-3 bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
        <i class="bi bi-cpu-fill fs-3"></i>
      </div>
      <h4 class="fw-bold text-dark mb-1">Welcome to AI Lab</h4>
      <p class="text-muted small">Authenticate to access models and datasets</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="needs-validation" novalidate>
      <div class="mb-3 text-start">
        <label for="usernameInput" class="form-label text-muted small fw-medium mb-1"><i class="bi bi-person me-1"></i>Username</label>
        <input type="text" class="form-control form-control-sm rounded-3 py-2" [ngClass]="{ 'is-invalid': submitted && f['username'].errors }" id="usernameInput" placeholder="Enter username" formControlName="username">
        <div *ngIf="submitted && f['username'].errors" class="invalid-feedback px-1 small">
          <div *ngIf="f['username'].errors['required']"><i class="bi bi-exclamation-circle me-1"></i>Required</div>
          <div *ngIf="f['username'].errors['minlength']"><i class="bi bi-exclamation-circle me-1"></i>Min 3 characters</div>
        </div>
      </div>

      <div class="mb-3 text-start">
        <label for="passwordInput" class="form-label text-muted small fw-medium mb-1"><i class="bi bi-lock me-1"></i>Password</label>
        <input type="password" class="form-control form-control-sm rounded-3 py-2" [ngClass]="{ 'is-invalid': submitted && f['password'].errors }" id="passwordInput" placeholder="Enter password" formControlName="password">
        <div *ngIf="submitted && f['password'].errors" class="invalid-feedback px-1 small">
          <div *ngIf="f['password'].errors['required']"><i class="bi bi-exclamation-circle me-1"></i>Required</div>
          <div *ngIf="f['password'].errors['minlength']"><i class="bi bi-exclamation-circle me-1"></i>Min 6 characters</div>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-4 small">
        <div class="form-check">
          <input class="form-check-input shadow-sm" type="checkbox" value="" id="rememberMe">
          <label class="form-check-label text-muted" for="rememberMe">
            Remember me
          </label>
        </div>
        <a href="#" class="text-primary text-decoration-none fw-medium">Forgot Password?</a>
      </div>

      <button type="submit" class="btn btn-primary btn-sm w-100 rounded-pill fw-bold shadow-sm mb-3 py-2">
        Login <i class="bi bi-arrow-right ms-1"></i>
      </button>

      <div class="text-center text-muted small">
        Don't have an account? <a href="#" class="text-primary text-decoration-none fw-bold">Sign up</a>
      </div>
    </form>
  </div>
</div>
