<div class="chat-container">
    <!-- Sidebar -->
    <div class="sidebar">
        <h3 class="sidebar-title">Chats</h3>
        <button class="new-chat-btn" (click)="newChat()">+ New Chat</button>
        <div class="chat-list">
            <div *ngFor="let chat of chatHistory; let i = index" 
                 (click)="loadChat(i)" 
                 class="chat-item" 
                 [class.active]="currentChatIndex === i">
                <span class="chat-icon">💬</span> Chat {{ i + 1 }}
            </div>
        </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
        <div class="messages">
            <div *ngIf="messages.length === 0" class="empty-state">
                <h2>How can I help you today?</h2>
                <p>Select a chat or start a new conversation.</p>
            </div>
            <div *ngFor="let msg of messages" [ngClass]="msg.role">
                <div class="bubble">
                    {{ msg.content }}
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-box">
                <input [(ngModel)]="userInput" (keyup.enter)="sendMessage()" placeholder="Type your health-related question..." />
                <button class="send-btn" (click)="sendMessage()" [disabled]="!userInput.trim()">Send</button>
            </div>
        </div>
    </div>
</div>
