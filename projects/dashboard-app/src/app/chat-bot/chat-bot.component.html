<div class="container mt-4">
    <div class="row">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header">ChatBot</div>
                <div class="card-body">
                    <input type="text" class="form-control" placeholder="Type your message..." [(ngModel)]="message">
                    <button class="btn btn-primary mt-2" (click)="sendMessage()">Send</button>
                </div>
                <div class="card-footer" *ngIf="reply">
                    {{ reply }}
                </div>
            </div>
        </div>
    </div>
</div>
