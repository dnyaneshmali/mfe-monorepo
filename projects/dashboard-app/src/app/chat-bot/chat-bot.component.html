<div class="chat-container">
    <!-- Sidebar -->
    <div class="sidebar">
        <h3 class="sidebar-title">Chats</h3>
        <button class="new-chat-btn" (click)="newChat()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-right: 8px; vertical-align: middle;">
                <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>New Chat
        </button>
        <div class="chat-list">
            <div *ngFor="let chat of chatHistory; let i = index" 
                 (click)="loadChat(i)" 
                 class="chat-item" 
                 [class.active]="currentChatIndex === i">
                 <span class="chat-icon">💬</span> Chat {{ i + 1 }}
            </div>
        </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
        <!-- Messages Section -->
        <div class="messages" #messagesContainer (scroll)="onScroll()" (click)="handleChatClick($event)">
            <div *ngIf="messages.length === 0" class="empty-state">
                <div class="empty-logo">AI</div>
                <h2>How can I help you today?</h2>
                <p>Start a new programming or design conversation with your AI tutor.</p>
            </div>
            
            <div *ngFor="let msg of messages" class="message-row" [ngClass]="[msg.role, msg.isStreaming ? 'streaming' : '']">
                <div class="message-wrapper">
                    <!-- Avatar Indicator -->
                    <div class="avatar" [ngClass]="msg.role">
                        <span *ngIf="msg.role === 'user'">U</span>
                        <span *ngIf="msg.role === 'bot'">AI</span>
                    </div>
                    <!-- Message Content -->
                    <div class="message-content">
                        <div class="author-name">{{ msg.role === 'user' ? 'You' : 'Instructor' }}</div>
                        <div class="message-text" *ngIf="msg.role === 'user'">{{ msg.content }}</div>
                        <div class="message-text" *ngIf="msg.role === 'bot'" [innerHTML]="msg.htmlContent"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Scroll to Bottom Button -->
        <button class="scroll-bottom-btn" *ngIf="showScrollButton" (click)="scrollToBottom()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 5V19M12 19L19 12M12 19L5 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

        <!-- Input Bar Area -->
        <div class="input-container">
            <div class="input-box">
                <input [(ngModel)]="userInput" (keyup.enter)="sendMessage()" placeholder="Ask a programming question..." />
                <button class="send-btn" (click)="sendMessage()" [disabled]="!userInput.trim()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 19V5M12 5L5 12M12 5L19 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <div class="input-footer">
                AI may make mistakes. Verify code and critical outputs.
            </div>
        </div>
    </div>
</div>
