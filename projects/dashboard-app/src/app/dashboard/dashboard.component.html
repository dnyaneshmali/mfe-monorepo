<div class="card border-0 shadow-sm rounded-4 w-100 p-4">
    <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
        <div>
            <h3 class="fw-bold text-dark mb-1">
                Hello, <span class="text-primary">{{ user?.name || 'Guest' }}</span>! <i class="bi bi-emoji-smile text-warning ms-1"></i>
            </h3>
            <p class="text-muted small mb-0">Role: <span class="badge bg-secondary">{{ user?.role || 'User' }}</span></p>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card border border-primary border-opacity-25 bg-primary bg-opacity-10 h-100 rounded-4">
                <div class="card-body text-center p-4">
                    <i class="bi bi-cpu text-primary display-4 mb-3"></i>
                    <h5 class="fw-bold">Active Models</h5>
                    <h2 class="text-primary fw-bolder mb-0">12</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border border-success border-opacity-25 bg-success bg-opacity-10 h-100 rounded-4">
                <div class="card-body text-center p-4">
                    <i class="bi bi-database text-success display-4 mb-3"></i>
                    <h5 class="fw-bold">Datasets</h5>
                    <h2 class="text-success fw-bolder mb-0">45 TB</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border border-warning border-opacity-25 bg-warning bg-opacity-10 h-100 rounded-4">
                <div class="card-body text-center p-4">
                    <i class="bi bi-activity text-warning display-4 mb-3"></i>
                    <h5 class="fw-bold">System Load</h5>
                    <h2 class="text-warning fw-bolder mb-0">28%</h2>
                </div>
            </div>
        </div>
    </div>
</div>
